            <div class="col-sm-6 ">
                <h4 class="card-title">Clear IG Session</h5>
                    <form class="form-inline">
                        <div class="form-group mx-sm-3 mb-2">
                            <input type="text" class="form-control" id="socialbuUserEmailForSession"
                                placeholder="User Email">
                            <input type="text" class="form-control" id="socialbuUserInstaUsername"
                                placeholder="Insta Username">
                        </div>
                        <button
                            onclick="copyToClip(document.getElementById('socialbuUserEmailForSession').value,document.getElementById('socialbuUserInstaUsername').value )"
                            class="btn btn-sm mb-2">Copy</button>
                        <script>
                            function copyToClip(str, st1) {
                                let str2 = "https://www.socialbu.com/app/clear_ig_session/" + str + "/" + st1;
                                function listener(e) {
                                    e.clipboardData.setData("text/html", str2);
                                    e.clipboardData.setData("text/plain", str2);
                                    e.preventDefault();
                                }
                                document.addEventListener("copy", listener);
                                document.execCommand("copy");
                                document.removeEventListener("copy", listener);
                            };
                        </script>
                    </form>
            </div>
